<!DOCTYPE html>
<html>
<head>
  <title>Phishing Detector</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Site Status</h2>
    </div>
    <div id="status-container" class="status-safe">
      <div class="icon" id="status-icon">✓</div>
      <h3 id="status-text">Safe</h3>
    </div>
    <div class="details">
      <p id="url-display">Checking...</p>
    </div>
    <div class="actions">
      <button id="report-btn">Report as Phishing</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
